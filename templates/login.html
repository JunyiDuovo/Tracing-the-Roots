{% extends "base.html" %}
{% block title %}登录 — 寻根溯源{% endblock %}
{% block body_class %}page-auth{% endblock %}
{% block header_class %}top--auth{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="auth-panel">
    <div class="auth-panel-header">
      <p class="auth-eyebrow">欢迎回来</p>
      <h1 class="auth-title">登录账户</h1>
      <p class="auth-sub">继续您的家谱编修与家族记忆</p>
    </div>
    <form method="post" class="auth-form" data-track-dirty="1" autocomplete="on">
      <div class="auth-field">
        <label for="login-username">用户名</label>
        <input id="login-username" name="username" required autocomplete="username" placeholder="请输入用户名">
      </div>
      <div class="auth-field">
        <label for="login-password">密码</label>
        <input id="login-password" name="password" type="password" required autocomplete="current-password" placeholder="请输入密码">
      </div>
      <div class="auth-actions">
        <button class="auth-btn auth-btn--primary" type="submit">登录</button>
      </div>
    </form>
    <p class="auth-switch">还没有账户？<a href="{{ url_for('register') }}">注册新账户</a></p>
  </div>
</div>
{% endblock %}
